services:
  # ── Private — full read/write, behind Cloudflare Access (only the owner) ──────
  sparinghorse:
    build: .
    image: sparinghorse:local
    container_name: sparinghorse
    restart: unless-stopped
    environment:
      # Secrets (Runalyze token + Claude key) are OPTIONAL here — you can set them in the private
      # Settings window instead (stored in ./secrets below, applied live, no restart). These env vars
      # are a fallback/bootstrap; a value set in the window overrides them.
      # Runalyze Personal API token (Premium): https://runalyze.com/settings/personal-api
      - RUNALYZE_TOKEN=${RUNALYZE_TOKEN:-}
      # The LLM adjustment layer (the plan engine's language/judgment).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SH_DB=/data/sparinghorse.db
      # Private-only secrets store — keys set in the Settings window land here, NOT in ./data (which
      # the public container shares + can read). This volume is mounted ONLY on this private service.
      - SH_SECRETS_DB=/secrets/secrets.db
      # Personalization — real values live in the git-ignored .env on the host, kept OUT of this
      # tracked file so the public mirror + publish_mirror.sh leak gate stay clean.
      # Header widgets (also set on the public container so they render there too):
      - SH_WEATHER_CITIES=${SH_WEATHER_CITIES:-}
      - SH_HOUSE_URL=${SH_HOUSE_URL:-}
      - SH_HOUSE_NAME=${SH_HOUSE_NAME:-}
      # Private-only: nightly-sync timezone, LLM athlete context, fresh-DB seed objective.
      - SH_TZ=${SH_TZ:-}
      - SH_ATHLETE_CONTEXT=${SH_ATHLETE_CONTEXT:-}
      - SH_SEED_OBJECTIVE=${SH_SEED_OBJECTIVE:-}
    volumes:
      # Locally-owned data copy lives on the NAS — back it up by copying this folder.
      # This is the single writer of the DB.
      - ./data:/data
      # Private-only key store (Runalyze token / Claude key set in the Settings window). Deliberately
      # NOT under ./data and NOT mounted on the public container — keeps secrets off the open box.
      - ./secrets:/secrets
    networks:
      - edge
    # NO host-published port. This instance has the tokens + medical data and NO app-level auth —
    # it trusts Cloudflare Access entirely, so it must be unreachable except through the tunnel.
    # cloudflared reaches it by service name (http://sparinghorse:8770) over the shared `edge`
    # network. For host-local debugging only, bind to loopback (never 0.0.0.0):
    #   ports: ["127.0.0.1:8770:8770"]

  # ── Public — always-open, read-only showcase (no Access) ─────────────────────
  # Same image, same DB, but SH_READONLY blocks every mutation + the medical sections,
  # the connection is query_only, and there are NO tokens — so it cannot sync, call the
  # LLM, or write, even if something tried. It just renders the latest shape + plan.
  sparinghorse-public:
    image: sparinghorse:local
    container_name: sparinghorse-public
    restart: unless-stopped
    depends_on:
      - sparinghorse        # ensures the image is built and the DB exists first
    environment:
      - SH_READONLY=1
      - SH_DB=/data/sparinghorse.db
      # - SH_PRIVATE_URL=https://private.example.com   # optional "Log in" link → your private console
      # deliberately NO RUNALYZE_TOKEN / ANTHROPIC_API_KEY here
      # Header widgets — public-visible by design (weather is 3 decoy capitals; real workout geo is
      # GPS-map-only and private). Real values from the host .env; no personal data in this file.
      - SH_WEATHER_CITIES=${SH_WEATHER_CITIES:-}
      - SH_HOUSE_URL=${SH_HOUSE_URL:-}
      - SH_HOUSE_NAME=${SH_HOUSE_NAME:-}
    volumes:
      # Same DB. NOT mounted :ro — SQLite WAL readers need to touch -wal/-shm; the
      # query_only PRAGMA + the request guard are the write barrier instead.
      - ./data:/data
    networks:
      - edge
    # Reached by the tunnel via service name (http://sparinghorse-public:8770) over `edge`.
    # Host-local debug only: ports: ["127.0.0.1:8771:8770"]

# Shared network for the Cloudflare tunnel to reach both instances by service name. cloudflared
# (its own stack, currently on the default `bridge`) must join this same network — see the deploy
# runbook. Naming it explicitly keeps the name stable regardless of the compose project/dir name.
networks:
  edge:
    name: sparinghorse-edge
